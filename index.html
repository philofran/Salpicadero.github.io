<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Fotos Familiares</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Dancing+Script:wght@700&family=Playfair+Display:wght@700&family=Montserrat:wght@700&family=Lobster&family=Raleway:wght@700&family=Oswald:wght@700&family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            padding: 0;
            background: linear-gradient(135deg, #ffecd2, #fcb69f);
            transition: background 0.5s;
        }

        /* ── NAVBAR ── */
        .navbar {
            background: rgba(139, 69, 19, 0.92);
            backdrop-filter: blur(8px);
            padding: 0 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar-brand {
            color: white;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .navbar-menu {
            display: flex;
            gap: 4px;
        }
        .navbar-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.85);
            font-size: 13px;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            font-weight: 500;
        }
        .navbar-btn:hover, .navbar-btn.activo {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        /* ── DROPDOWN MENUS ── */
        .dropdown { position: relative; }
        .dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: white;
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            padding: 10px;
            min-width: 220px;
            z-index: 200;
        }
        .dropdown:hover .dropdown-menu,
        .dropdown-menu:hover { display: block; }
        .dropdown-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 10px;
            border-radius: 7px;
            font-size: 13px;
            color: #333;
            gap: 10px;
        }
        .dropdown-item:hover { background: #f5f0eb; }
        .dropdown-item label {
            font-size: 12px;
            color: #666;
            white-space: nowrap;
        }
        .dropdown-item select,
        .dropdown-item input[type="color"],
        .dropdown-item input[type="range"] {
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 3px 6px;
            font-size: 12px;
            cursor: pointer;
            background: white;
        }
        .dropdown-item input[type="color"] {
            width: 40px; height: 28px; padding: 2px;
        }
        .dropdown-item input[type="range"] { width: 100px; }
        .dropdown-item input[type="file"] { font-size: 11px; max-width: 140px; }
        .dropdown-sep {
            height: 1px;
            background: #eee;
            margin: 6px 0;
        }

        /* ── CONTENIDO ── */
        .contenido {
            max-width: 960px;
            margin: 0 auto;
            padding: 24px 20px;
        }

        /* ── TÍTULO ── */
        h1 {
            text-align: center;
            color: #8B4513;
            font-size: 36px;
            margin-bottom: 24px;
            transition: all 0.3s;
        }

        /* ── CARPETAS ── */
        .seccion-titulo {
            font-size: 13px;
            font-weight: bold;
            color: #8B4513;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            padding-left: 2px;
            border-left: 3px solid #8B4513;
            padding-left: 8px;
        }
        .carpetas-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 30px;
        }
        .carpeta {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100px;
            padding: 10px;
            border-radius: 12px;
            background: rgba(255,255,255,0.4);
        }
        .carpeta:hover {
            transform: scale(1.06);
            background: rgba(255,255,255,0.65);
        }
        .carpeta-icono { font-size: 52px; line-height: 1; }
        .carpeta-nombre {
            font-size: 12px;
            font-weight: bold;
            color: #5a3010;
            text-align: center;
            margin-top: 6px;
        }
        .carpeta-conteo {
            font-size: 11px;
            color: #999;
            margin-top: 2px;
        }

        /* ── GALERÍA ── */
        .galeria {
            display: grid;
            gap: 14px;
            grid-template-columns: repeat(3, 1fr);
        }
        .galeria.grande { grid-template-columns: repeat(2, 1fr); }
        .galeria.circulos img {
            border-radius: 50% !important;
            height: 190px !important;
            width: 190px !important;
            justify-self: center;
        }
        .galeria img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.18);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .galeria.grande img { height: 270px; }
        .galeria img:hover {
            transform: scale(1.04);
            box-shadow: 0 8px 22px rgba(0,0,0,0.28);
        }

        /* ── PAGINACIÓN ── */
        .paginacion {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin: 22px 0;
            flex-wrap: wrap;
        }
        .paginacion button {
            padding: 7px 13px;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.7);
            color: #8B4513;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }
        .paginacion button.activo { background: #8B4513; color: white; }
        .paginacion button:hover { background: #c8784a; color: white; }

        .btn-ver-mas {
            display: none;
            margin: 18px auto;
            padding: 11px 28px;
            border: none;
            border-radius: 12px;
            background: #8B4513;
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-ver-mas:hover { background: #a0522d; }

        /* ── MODAL CARPETA ── */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.65);
            z-index: 8000;
            justify-content: center;
            align-items: center;
        }
        .modal.activo { display: flex; }
        .modal-contenido {
            background: white;
            border-radius: 18px;
            padding: 24px;
            max-width: 860px;
            width: 95%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.25);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            border-bottom: 2px solid #f0e0d0;
            padding-bottom: 12px;
        }
        .modal-header h2 { color: #8B4513; font-size: 20px; }
        .modal-cerrar {
            font-size: 26px;
            cursor: pointer;
            color: #bbb;
            font-weight: bold;
        }
        .modal-cerrar:hover { color: #333; }
        .galeria-modal {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .galeria-modal img {
            width: 100%;
            height: 170px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 3px 8px rgba(0,0,0,0.12);
        }
        .galeria-modal img:hover { transform: scale(1.04); }

        /* ── LIGHTBOX ── */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .lightbox.activo { display: flex; }
        .lightbox img {
            max-width: 92%;
            max-height: 92%;
            border-radius: 10px;
        }
        .lb-cerrar {
            position: absolute;
            top: 18px; right: 26px;
            font-size: 38px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        .lb-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 44px;
            color: white;
            cursor: pointer;
            background: rgba(0,0,0,0.35);
            padding: 10px 16px;
            border-radius: 50%;
            user-select: none;
        }
        .lb-nav:hover { background: rgba(0,0,0,0.6); }
        .lb-nav.izq { left: 18px; }
        .lb-nav.der { right: 18px; }
    </style>
</head>
<body>

<!-- ══ NAVBAR ══ -->
<nav class="navbar">
    <div class="navbar-brand">📷 Mis Fotos Familiares</div>
    <div class="navbar-menu">

        <!-- TÍTULO -->
        <div class="dropdown">
            <button class="navbar-btn">✏️ Título ▾</button>
            <div class="dropdown-menu">
                <div class="dropdown-item">
                    <label>Color</label>
                    <input type="color" id="colorTitulo" value="#8B4513" onchange="guardar('colorTitulo',this.value);cambiarColor()">
                </div>
                <div class="dropdown-item">
                    <label>Tamaño</label>
                    <input type="range" id="tamanoTitulo" min="20" max="72" value="36" oninput="guardar('tamanoTitulo',this.value);cambiarTamano()">
                </div>
                <div class="dropdown-item">
                    <label>Fuente</label>
                    <select id="fuenteTitulo" onchange="guardar('fuenteTitulo',this.value);cambiarFuente()">
                        <option value="Arial">Arial</option>
                        <option value="Georgia">Georgia</option>
                        <option value="Pacifico">Pacifico</option>
                        <option value="Dancing Script">Dancing Script</option>
                        <option value="Playfair Display">Playfair Display</option>
                        <option value="Montserrat">Montserrat</option>
                        <option value="Lobster">Lobster</option>
                        <option value="Raleway">Raleway</option>
                        <option value="Oswald">Oswald</option>
                        <option value="Caveat">Caveat</option>
                        <option value="Courier New">Courier New</option>
                        <option value="Impact">Impact</option>
                    </select>
                </div>
                <div class="dropdown-item">
                    <label>Diseño</label>
                    <select id="disenoTitulo" onchange="guardar('disenoTitulo',this.value);cambiarDiseno()">
                        <option value="normal">Normal</option>
                        <option value="sombra">Con sombra</option>
                        <option value="subrayado">Subrayado</option>
                        <option value="mayusculas">MAYÚSCULAS</option>
                        <option value="espaciado">Espaciado</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- FOTOS -->
        <div class="dropdown">
            <button class="navbar-btn">🖼️ Fotos ▾</button>
            <div class="dropdown-menu">
                <div class="dropdown-item">
                    <label>Forma</label>
                    <select id="formaFotos" onchange="guardar('formaFotos',this.value);cambiarForma()">
                        <option value="cuadricula">Cuadrícula</option>
                        <option value="circulos">Círculos</option>
                        <option value="grande">Cuadros grandes</option>
                    </select>
                </div>
                <div class="dropdown-item">
                    <label>Por página</label>
                    <select id="fotosPorPagina" onchange="guardar('fotosPorPagina',this.value);cambiarFotosPorPagina()">
                        <option value="4">4</option>
                        <option value="6">6</option>
                        <option value="9" selected>9</option>
                        <option value="12">12</option>
                    </select>
                </div>
                <div class="dropdown-item">
                    <label>Ordenar</label>
                    <select id="ordenFotos" onchange="ordenarFotos()">
                        <option value="original">Original</option>
                        <option value="az">A → Z</option>
                        <option value="za">Z → A</option>
                        <option value="nuevas">Más nuevas</option>
                        <option value="antiguas">Más antiguas</option>
                    </select>
                </div>
                <div class="dropdown-item">
                    <label>Vista</label>
                    <select id="modoVista" onchange="guardar('modoVista',this.value);cambiarModoVista()">
                        <option value="paginas">Páginas</option>
                        <option value="vermas">Ver más</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- FONDO -->
        <div class="dropdown">
            <button class="navbar-btn">🎨 Fondo ▾</button>
            <div class="dropdown-menu">
                <div class="dropdown-item">
                    <label>Tipo</label>
                    <select id="tipoFondo" onchange="guardar('tipoFondo',this.value);mostrarOpcionesFondo()">
                        <option value="degradado">Degradado</option>
                        <option value="solido">Sólido</option>
                        <option value="imagen">Mi imagen</option>
                    </select>
                </div>
                <div id="grupoDegradado">
                    <div class="dropdown-item">
                        <label>Color 1</label>
                        <input type="color" id="color1" value="#ffecd2" onchange="guardar('color1',this.value);aplicarDegradado()">
                    </div>
                    <div class="dropdown-item">
                        <label>Color 2</label>
                        <input type="color" id="color2" value="#fcb69f" onchange="guardar('color2',this.value);aplicarDegradado()">
                    </div>
                </div>
                <div id="grupoSolido" style="display:none">
                    <div class="dropdown-item">
                        <label>Color</label>
                        <input type="color" id="colorSolido" value="#ffecd2" onchange="guardar('colorSolido',this.value);aplicarSolido()">
                    </div>
                </div>
                <div id="grupoImagen" style="display:none">
                    <div class="dropdown-item">
                        <label>Imagen</label>
                        <input type="file" id="imagenFondo" accept="image/*" onchange="aplicarImagenFondo()">
                    </div>
                </div>
            </div>
        </div>

        <!-- CARPETAS -->
        <div class="dropdown">
            <button class="navbar-btn">📁 Carpetas ▾</button>
            <div class="dropdown-menu">
                <div class="dropdown-item">
                    <label>Color carpetas</label>
                    <input type="color" id="colorCarpetas" value="#ffffff" onchange="guardar('colorCarpetas',this.value);cambiarColorCarpetas()">
                </div>
                <div class="dropdown-item">
                    <label>Opacidad</label>
                    <input type="range" id="opacidadCarpetas" min="10" max="100" value="40" oninput="guardar('opacidadCarpetas',this.value);cambiarColorCarpetas()">
                </div>
            </div>
        </div>

    </div>
</nav>

<!-- ══ CONTENIDO ══ -->
<div class="contenido">
    <h1 id="titulo">📷 Mis Fotos Familiares</h1>

    <div class="seccion-titulo">📁 Álbumes</div>
    <div class="carpetas-grid" id="carpetasGrid"></div>

    <div class="seccion-titulo">🖼️ Fotos en el escritorio</div>
    <div class="galeria cuadricula" id="galeria"></div>
    <div class="paginacion" id="paginacion"></div>
    <button class="btn-ver-mas" id="btnVerMas" onclick="verMas()">Ver más fotos ▼</button>
</div>

<!-- ══ MODAL CARPETA ══ -->
<div class="modal" id="modal">
    <div class="modal-contenido">
        <div class="modal-header">
            <h2 id="modalTitulo">📁 Álbum</h2>
            <span class="modal-cerrar" onclick="cerrarModal()">✕</span>
        </div>
        <div class="galeria-modal" id="galeriaModal"></div>
    </div>
</div>

<!-- ══ LIGHTBOX ══ -->
<div class="lightbox" id="lightbox">
    <span class="lb-cerrar" onclick="cerrarLightbox()">✕</span>
    <span class="lb-nav izq" onclick="cambiarFoto(-1)">&#10094;</span>
    <img id="lightboxImg" src="" alt="Foto">
    <span class="lb-nav der" onclick="cambiarFoto(1)">&#10095;</span>
</div>

<script>
// ══ GUARDAR/CARGAR CONFIGURACIÓN ══
function guardar(clave, valor) {
    localStorage.setItem('mfam_' + clave, valor);
}
function cargar(clave, defecto) {
    return localStorage.getItem('mfam_' + clave) || defecto;
}

// ══ DATOS ══
let datos = {};
let fotosEscritorio = [];
let fotosLightbox = [];
let fotoActual = 0;
let paginaActual = 1;
let fotosPorPagina = 9;
let fotosVisibles = 9;
let modoVista = "paginas";

fetch('fotos.json')
    .then(r => r.json())
    .then(data => {
        datos = data;
        fotosEscritorio = [...data.escritorio];
        aplicarConfigGuardada();
        renderizarCarpetas();
        renderizar();
    });

// ══ APLICAR CONFIG GUARDADA ══
function aplicarConfigGuardada() {
    // Título
    const color = cargar('colorTitulo', '#8B4513');
    const tamano = cargar('tamanoTitulo', '36');
    const fuente = cargar('fuenteTitulo', 'Arial');
    const diseno = cargar('disenoTitulo', 'normal');
    document.getElementById('colorTitulo').value = color;
    document.getElementById('tamanoTitulo').value = tamano;
    document.getElementById('fuenteTitulo').value = fuente;
    document.getElementById('disenoTitulo').value = diseno;
    const t = document.getElementById('titulo');
    t.style.color = color;
    t.style.fontSize = tamano + 'px';
    t.style.fontFamily = fuente;
    aplicarDisenoTitulo(diseno);

    // Fotos
    const forma = cargar('formaFotos', 'cuadricula');
    const porPagina = cargar('fotosPorPagina', '9');
    const vista = cargar('modoVista', 'paginas');
    document.getElementById('formaFotos').value = forma;
    document.getElementById('fotosPorPagina').value = porPagina;
    document.getElementById('modoVista').value = vista;
    document.getElementById('galeria').className = 'galeria ' + forma;
    fotosPorPagina = parseInt(porPagina);
    fotosVisibles = fotosPorPagina;
    modoVista = vista;

    // Fondo
    const tipoFondo = cargar('tipoFondo', 'degradado');
    document.getElementById('tipoFondo').value = tipoFondo;
    mostrarOpcionesFondo();
    if (tipoFondo === 'degradado') {
        const c1 = cargar('color1', '#ffecd2');
        const c2 = cargar('color2', '#fcb69f');
        document.getElementById('color1').value = c1;
        document.getElementById('color2').value = c2;
        document.body.style.background = `linear-gradient(135deg, ${c1}, ${c2})`;
    } else if (tipoFondo === 'solido') {
        const cs = cargar('colorSolido', '#ffecd2');
        document.getElementById('colorSolido').value = cs;
        document.body.style.background = cs;
    }

    // Carpetas
    const colorCarp = cargar('colorCarpetas', '#ffffff');
    const opCarp = cargar('opacidadCarpetas', '40');
    document.getElementById('colorCarpetas').value = colorCarp;
    document.getElementById('opacidadCarpetas').value = opCarp;
}

// ══ CARPETAS ══
function renderizarCarpetas() {
    const grid = document.getElementById("carpetasGrid");
    grid.innerHTML = "";
    const colorCarp = cargar('colorCarpetas', '#ffffff');
    const opCarp = parseInt(cargar('opacidadCarpetas', '40')) / 100;
    const r = parseInt(colorCarp.slice(1,3),16);
    const g = parseInt(colorCarp.slice(3,5),16);
    const b = parseInt(colorCarp.slice(5,7),16);
    const bg = `rgba(${r},${g},${b},${opCarp})`;

    Object.entries(datos.carpetas).forEach(([nombre, fotos]) => {
        const div = document.createElement("div");
        div.className = "carpeta";
        div.style.background = bg;
        div.innerHTML = `
            <div class="carpeta-icono">📁</div>
            <div class="carpeta-nombre">${nombre}</div>
            <div class="carpeta-conteo">${fotos.length} foto${fotos.length !== 1 ? 's' : ''}</div>
        `;
        div.onclick = () => abrirCarpeta(nombre, fotos);
        grid.appendChild(div);
    });
}

function cambiarColorCarpetas() {
    renderizarCarpetas();
}

function abrirCarpeta(nombre, fotos) {
    document.getElementById("modalTitulo").textContent = "📁 " + nombre;
    const gm = document.getElementById("galeriaModal");
    gm.innerHTML = "";
    fotosLightbox = fotos;
    fotos.forEach((foto, i) => {
        const img = document.createElement("img");
        img.src = foto;
        img.alt = foto;
        img.onclick = () => abrirLightbox(i, fotos);
        gm.appendChild(img);
    });
    document.getElementById("modal").classList.add("activo");
}

function cerrarModal() {
    document.getElementById("modal").classList.remove("activo");
}

// ══ GALERÍA ══
function renderizar() {
    const galeria = document.getElementById("galeria");
    galeria.innerHTML = "";
    let fotosAMostrar = [];

    if (modoVista === "paginas") {
        const inicio = (paginaActual - 1) * fotosPorPagina;
        fotosAMostrar = fotosEscritorio.slice(inicio, inicio + fotosPorPagina);
    } else {
        fotosAMostrar = fotosEscritorio.slice(0, fotosVisibles);
    }

    fotosAMostrar.forEach((foto, i) => {
        const img = document.createElement("img");
        img.src = foto;
        img.alt = "Foto " + (i + 1);
        const indexReal = modoVista === "paginas"
            ? (paginaActual - 1) * fotosPorPagina + i : i;
        img.onclick = () => abrirLightbox(indexReal, fotosEscritorio);
        galeria.appendChild(img);
    });

    if (modoVista === "paginas") {
        renderizarPaginacion();
        document.getElementById("btnVerMas").style.display = "none";
    } else {
        document.getElementById("paginacion").innerHTML = "";
        document.getElementById("btnVerMas").style.display =
            fotosVisibles < fotosEscritorio.length ? "block" : "none";
    }
}

function renderizarPaginacion() {
    const total = Math.ceil(fotosEscritorio.length / fotosPorPagina);
    const pag = document.getElementById("paginacion");
    pag.innerHTML = "";
    if (total <= 1) return;
    const prev = document.createElement("button");
    prev.textContent = "◀";
    prev.onclick = () => { if (paginaActual > 1) { paginaActual--; renderizar(); } };
    pag.appendChild(prev);
    for (let i = 1; i <= total; i++) {
        const btn = document.createElement("button");
        btn.textContent = i;
        if (i === paginaActual) btn.classList.add("activo");
        btn.onclick = ((p) => () => { paginaActual = p; renderizar(); })(i);
        pag.appendChild(btn);
    }
    const next = document.createElement("button");
    next.textContent = "▶";
    next.onclick = () => { if (paginaActual < total) { paginaActual++; renderizar(); } };
    pag.appendChild(next);
}

function verMas() {
    fotosVisibles += fotosPorPagina;
    renderizar();
}

// ══ LIGHTBOX ══
function abrirLightbox(index, lista) {
    fotoActual = index;
    fotosLightbox = lista;
    document.getElementById("lightboxImg").src = fotosLightbox[fotoActual];
    document.getElementById("lightbox").classList.add("activo");
}
function cerrarLightbox() {
    document.getElementById("lightbox").classList.remove("activo");
}
function cambiarFoto(dir) {
    fotoActual += dir;
    if (fotoActual < 0) fotoActual = fotosLightbox.length - 1;
    if (fotoActual >= fotosLightbox.length) fotoActual = 0;
    document.getElementById("lightboxImg").src = fotosLightbox[fotoActual];
}

// ══ CONTROLES ══
function cambiarColor() {
    document.getElementById("titulo").style.color = document.getElementById("colorTitulo").value;
}
function cambiarTamano() {
    document.getElementById("titulo").style.fontSize = document.getElementById("tamanoTitulo").value + "px";
}
function cambiarFuente() {
    document.getElementById("titulo").style.fontFamily = document.getElementById("fuenteTitulo").value;
}
function cambiarDiseno() {
    aplicarDisenoTitulo(document.getElementById("disenoTitulo").value);
}
function aplicarDisenoTitulo(d) {
    const t = document.getElementById("titulo");
    t.style.textShadow = "";
    t.style.textDecoration = "";
    t.style.textTransform = "";
    t.style.letterSpacing = "";
    if (d === "sombra") t.style.textShadow = "3px 3px 8px rgba(0,0,0,0.35)";
    else if (d === "subrayado") t.style.textDecoration = "underline";
    else if (d === "mayusculas") t.style.textTransform = "uppercase";
    else if (d === "espaciado") t.style.letterSpacing = "10px";
}
function cambiarForma() {
    const forma = document.getElementById("formaFotos").value;
    document.getElementById("galeria").className = "galeria " + forma;
}
function cambiarFotosPorPagina() {
    fotosPorPagina = parseInt(document.getElementById("fotosPorPagina").value);
    fotosVisibles = fotosPorPagina;
    paginaActual = 1;
    renderizar();
}
function cambiarModoVista() {
    modoVista = document.getElementById("modoVista").value;
    paginaActual = 1;
    fotosVisibles = fotosPorPagina;
    renderizar();
}
function ordenarFotos() {
    const orden = document.getElementById("ordenFotos").value;
    if (orden === "original") fotosEscritorio = [...datos.escritorio];
    else if (orden === "az") fotosEscritorio = [...datos.escritorio].sort();
    else if (orden === "za") fotosEscritorio = [...datos.escritorio].sort().reverse();
    else if (orden === "nuevas") fotosEscritorio = [...datos.escritorio].reverse();
    else if (orden === "antiguas") fotosEscritorio = [...datos.escritorio];
    paginaActual = 1;
    renderizar();
}
function mostrarOpcionesFondo() {
    const tipo = document.getElementById("tipoFondo").value;
    document.getElementById("grupoDegradado").style.display = tipo === "degradado" ? "block" : "none";
    document.getElementById("grupoSolido").style.display = tipo === "solido" ? "block" : "none";
    document.getElementById("grupoImagen").style.display = tipo === "imagen" ? "block" : "none";
    if (tipo === "degradado") aplicarDegradado();
    if (tipo === "solido") aplicarSolido();
}
function aplicarDegradado() {
    const c1 = document.getElementById("color1").value;
    const c2 = document.getElementById("color2").value;
    document.body.style.background = `linear-gradient(135deg, ${c1}, ${c2})`;
}
function aplicarSolido() {
    document.body.style.background = document.getElementById("colorSolido").value;
}
function aplicarImagenFondo() {
    const f = document.getElementById("imagenFondo").files[0];
    if (!f) return;
    document.body.style.background = `url('${URL.createObjectURL(f)}') center/cover no-repeat fixed`;
}

document.addEventListener("keydown", e => {
    if (e.key === "Escape") { cerrarLightbox(); cerrarModal(); }
    if (e.key === "ArrowRight") cambiarFoto(1);
    if (e.key === "ArrowLeft") cambiarFoto(-1);
});
</script>
</body>
</html>
