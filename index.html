<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Fotos Familiares</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Dancing+Script:wght@700&family=Playfair+Display:wght@700&family=Montserrat:wght@700&family=Lobster&family=Raleway:wght@700&family=Oswald:wght@700&family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            padding: 20px;
            background: linear-gradient(135deg, #ffecd2, #fcb69f);
            transition: background 0.5s;
        }
        h1 {
            text-align: center;
            color: #8B4513;
            font-size: 36px;
            margin: 15px 0;
            transition: all 0.3s;
        }

        /* ── PANEL ── */
        .panel {
            border-radius: 15px;
            padding: 12px 16px;
            max-width: 1000px;
            margin: 0 auto 20px auto;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            align-items: flex-end;
            background: rgba(255,255,255,0.55);
            backdrop-filter: blur(6px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            transition: background 0.4s;
        }
        .seccion-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: flex-end;
            justify-content: center;
            padding: 6px 10px;
            border-radius: 10px;
            background: rgba(255,255,255,0.3);
        }
        .grupo {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }
        .grupo label {
            font-weight: bold;
            font-size: 11px;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .grupo select,
        .grupo input[type="color"],
        .grupo input[type="range"] {
            padding: 4px 6px;
            border-radius: 7px;
            border: 1px solid #ccc;
            cursor: pointer;
            font-size: 12px;
            background: white;
        }
        .grupo input[type="color"] { width: 46px; height: 30px; padding: 2px; }
        .grupo input[type="range"] { width: 90px; }
        .grupo input[type="file"] { font-size: 11px; max-width: 130px; }
        .sep { width: 1px; height: 55px; background: rgba(0,0,0,0.12); margin: 0 4px; }

        /* ── ESCRITORIO ── */
        .escritorio {
            max-width: 900px;
            margin: 0 auto 25px auto;
        }
        .escritorio-titulo {
            font-size: 15px;
            font-weight: bold;
            color: #8B4513;
            margin-bottom: 12px;
            padding-left: 4px;
        }

        /* ── CARPETAS ── */
        .carpetas-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            max-width: 900px;
            margin: 0 auto 25px auto;
        }
        .carpeta {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
            width: 110px;
        }
        .carpeta:hover { transform: scale(1.08); }
        .carpeta-icono {
            font-size: 64px;
            line-height: 1;
            filter: drop-shadow(2px 3px 4px rgba(0,0,0,0.2));
        }
        .carpeta-nombre {
            font-size: 13px;
            font-weight: bold;
            color: #5a3010;
            text-align: center;
            margin-top: 6px;
            word-break: break-word;
        }
        .carpeta-conteo {
            font-size: 11px;
            color: #888;
            margin-top: 2px;
        }

        /* ── GALERÍA ── */
        .galeria {
            display: grid;
            gap: 14px;
            grid-template-columns: repeat(3, 1fr);
            transition: all 0.3s;
        }
        .galeria.grande { grid-template-columns: repeat(2, 1fr); }
        .galeria.circulos img {
            border-radius: 50% !important;
            height: 190px !important;
            width: 190px !important;
            justify-self: center;
        }
        .galeria img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .galeria.grande img { height: 270px; border-radius: 14px; }
        .galeria img:hover {
            transform: scale(1.04);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        /* ── PAGINACIÓN ── */
        .paginacion {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin: 20px auto;
            flex-wrap: wrap;
            max-width: 900px;
        }
        .paginacion button {
            padding: 7px 13px;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.7);
            color: #8B4513;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
        }
        .paginacion button.activo { background: #8B4513; color: white; }
        .paginacion button:hover { background: #c8784a; color: white; }

        .btn-ver-mas {
            display: none;
            margin: 18px auto;
            padding: 11px 28px;
            border: none;
            border-radius: 12px;
            background: #8B4513;
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-ver-mas:hover { background: #a0522d; }

        /* ── MODAL CARPETA ── */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 8000;
            justify-content: center;
            align-items: center;
        }
        .modal.activo { display: flex; }
        .modal-contenido {
            background: white;
            border-radius: 18px;
            padding: 24px;
            max-width: 860px;
            width: 95%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            border-bottom: 2px solid #f0e0d0;
            padding-bottom: 12px;
        }
        .modal-header h2 { color: #8B4513; font-size: 22px; }
        .modal-cerrar {
            font-size: 28px;
            cursor: pointer;
            color: #aaa;
            font-weight: bold;
            line-height: 1;
        }
        .modal-cerrar:hover { color: #333; }
        .galeria-modal {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .galeria-modal img {
            width: 100%;
            height: 170px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 3px 8px rgba(0,0,0,0.15);
        }
        .galeria-modal img:hover { transform: scale(1.04); }

        /* ── LIGHTBOX ── */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .lightbox.activo { display: flex; }
        .lightbox img {
            max-width: 92%;
            max-height: 92%;
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(255,255,255,0.15);
        }
        .lb-cerrar {
            position: absolute;
            top: 18px; right: 26px;
            font-size: 38px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        .lb-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 46px;
            color: white;
            cursor: pointer;
            background: rgba(0,0,0,0.35);
            padding: 10px 16px;
            border-radius: 50%;
            user-select: none;
        }
        .lb-nav:hover { background: rgba(0,0,0,0.6); }
        .lb-nav.izq { left: 18px; }
        .lb-nav.der { right: 18px; }
    </style>
</head>
<body>

<h1 id="titulo">📷 Mis Fotos Familiares</h1>

<!-- ══ PANEL ══ -->
<div class="panel" id="panel">
    <div class="seccion-panel">
        <div class="grupo">
            <label>Color título</label>
            <input type="color" id="colorTitulo" value="#8B4513" onchange="cambiarColor()">
        </div>
        <div class="grupo">
            <label>Tamaño</label>
            <input type="range" id="tamanoTitulo" min="20" max="72" value="36" oninput="cambiarTamano()">
        </div>
        <div class="grupo">
            <label>Fuente</label>
            <select id="fuenteTitulo" onchange="cambiarFuente()">
                <option value="Arial">Arial</option>
                <option value="Georgia">Georgia</option>
                <option value="Pacifico">Pacifico</option>
                <option value="Dancing Script">Dancing Script</option>
                <option value="Playfair Display">Playfair Display</option>
                <option value="Montserrat">Montserrat</option>
                <option value="Lobster">Lobster</option>
                <option value="Raleway">Raleway</option>
                <option value="Oswald">Oswald</option>
                <option value="Caveat">Caveat</option>
                <option value="Courier New">Courier New</option>
                <option value="Impact">Impact</option>
            </select>
        </div>
        <div class="grupo">
            <label>Diseño</label>
            <select id="disenoTitulo" onchange="cambiarDiseno()">
                <option value="normal">Normal</option>
                <option value="sombra">Con sombra</option>
                <option value="subrayado">Subrayado</option>
                <option value="mayusculas">MAYÚSCULAS</option>
                <option value="espaciado">E S P A C I A D O</option>
            </select>
        </div>
    </div>
    <div class="sep"></div>
    <div class="seccion-panel">
        <div class="grupo">
            <label>Forma</label>
            <select id="formaFotos" onchange="cambiarForma()">
                <option value="cuadricula">Cuadrícula</option>
                <option value="circulos">Círculos</option>
                <option value="grande">Cuadros grandes</option>
            </select>
        </div>
        <div class="grupo">
            <label>Fotos/página</label>
            <select id="fotosPorPagina" onchange="cambiarFotosPorPagina()">
                <option value="4">4</option>
                <option value="6">6</option>
                <option value="9" selected>9</option>
                <option value="12">12</option>
            </select>
        </div>
        <div class="grupo">
            <label>Ordenar</label>
            <select id="ordenFotos" onchange="ordenarFotos()">
                <option value="original">Original</option>
                <option value="az">A → Z</option>
                <option value="za">Z → A</option>
                <option value="nuevas">Más nuevas</option>
                <option value="antiguas">Más antiguas</option>
            </select>
        </div>
        <div class="grupo">
            <label>Vista</label>
            <select id="modoVista" onchange="cambiarModoVista()">
                <option value="paginas">Páginas</option>
                <option value="vermas">Ver más</option>
            </select>
        </div>
    </div>
    <div class="sep"></div>
    <div class="seccion-panel">
        <div class="grupo">
            <label>Tipo fondo</label>
            <select id="tipoFondo" onchange="mostrarOpcionesFondo()">
                <option value="degradado">Degradado</option>
                <option value="solido">Sólido</option>
                <option value="imagen">Mi imagen</option>
            </select>
        </div>
        <div class="grupo" id="grupoDegradado">
            <label>Color 1</label>
            <input type="color" id="color1" value="#ffecd2" onchange="aplicarDegradado()">
            <label>Color 2</label>
            <input type="color" id="color2" value="#fcb69f" onchange="aplicarDegradado()">
        </div>
        <div class="grupo" id="grupoSolido" style="display:none">
            <label>Color fondo</label>
            <input type="color" id="colorSolido" value="#ffecd2" onchange="aplicarSolido()">
        </div>
        <div class="grupo" id="grupoImagen" style="display:none">
            <label>Imagen fondo</label>
            <input type="file" id="imagenFondo" accept="image/*" onchange="aplicarImagenFondo()">
        </div>
        <div class="grupo">
            <label>Color panel</label>
            <input type="color" id="colorPanel" value="#ffffff" onchange="cambiarColorPanel()">
        </div>
        <div class="grupo">
            <label>Opacidad panel</label>
            <input type="range" id="opacidadPanel" min="10" max="100" value="55" oninput="cambiarColorPanel()">
        </div>
    </div>
</div>

<!-- ══ CARPETAS ══ -->
<div class="carpetas-grid" id="carpetasGrid"></div>

<!-- ══ ESCRITORIO ══ -->
<div class="escritorio">
    <div class="escritorio-titulo">🖼️ Fotos en el escritorio</div>
    <div class="galeria cuadricula" id="galeria"></div>
    <div class="paginacion" id="paginacion"></div>
    <button class="btn-ver-mas" id="btnVerMas" onclick="verMas()">Ver más fotos ▼</button>
</div>

<!-- ══ MODAL CARPETA ══ -->
<div class="modal" id="modal">
    <div class="modal-contenido">
        <div class="modal-header">
            <h2 id="modalTitulo">📁 Carpeta</h2>
            <span class="modal-cerrar" onclick="cerrarModal()">✕</span>
        </div>
        <div class="galeria-modal" id="galeriaModal"></div>
    </div>
</div>

<!-- ══ LIGHTBOX ══ -->
<div class="lightbox" id="lightbox">
    <span class="lb-cerrar" onclick="cerrarLightbox()">✕</span>
    <span class="lb-nav izq" onclick="cambiarFoto(-1)">&#10094;</span>
    <img id="lightboxImg" src="" alt="Foto">
    <span class="lb-nav der" onclick="cambiarFoto(1)">&#10095;</span>
</div>

<script>
let datos = {};
let fotosEscritorio = [];
let fotosLightbox = [];
let fotoActual = 0;
let paginaActual = 1;
let fotosPorPagina = 9;
let fotosVisibles = 9;
let modoVista = "paginas";

fetch('fotos.json')
    .then(r => r.json())
    .then(data => {
        datos = data;
        fotosEscritorio = [...data.escritorio];
        renderizarCarpetas();
        renderizar();
    });

// ── CARPETAS ──
function renderizarCarpetas() {
    const grid = document.getElementById("carpetasGrid");
    grid.innerHTML = "";
    Object.entries(datos.carpetas).forEach(([nombre, fotos]) => {
        const div = document.createElement("div");
        div.className = "carpeta";
        div.innerHTML = `
            <div class="carpeta-icono">📁</div>
            <div class="carpeta-nombre">${nombre}</div>
            <div class="carpeta-conteo">${fotos.length} foto${fotos.length !== 1 ? 's' : ''}</div>
        `;
        div.onclick = () => abrirCarpeta(nombre, fotos);
        grid.appendChild(div);
    });
}

function abrirCarpeta(nombre, fotos) {
    document.getElementById("modalTitulo").textContent = "📁 " + nombre;
    const gm = document.getElementById("galeriaModal");
    gm.innerHTML = "";
    fotosLightbox = fotos;
    fotos.forEach((foto, i) => {
        const img = document.createElement("img");
        img.src = foto;
        img.alt = foto;
        img.onclick = () => abrirLightbox(i, fotos);
        gm.appendChild(img);
    });
    document.getElementById("modal").classList.add("activo");
}

function cerrarModal() {
    document.getElementById("modal").classList.remove("activo");
}

// ── GALERÍA ESCRITORIO ──
function renderizar() {
    const galeria = document.getElementById("galeria");
    galeria.innerHTML = "";
    let fotosAMostrar = [];

    if (modoVista === "paginas") {
        const inicio = (paginaActual - 1) * fotosPorPagina;
        fotosAMostrar = fotosEscritorio.slice(inicio, inicio + fotosPorPagina);
    } else {
        fotosAMostrar = fotosEscritorio.slice(0, fotosVisibles);
    }

    fotosLightbox = fotosEscritorio;

    fotosAMostrar.forEach((foto, i) => {
        const img = document.createElement("img");
        img.src = foto;
        img.alt = "Foto " + (i + 1);
        const indexReal = modoVista === "paginas"
            ? (paginaActual - 1) * fotosPorPagina + i : i;
        img.onclick = () => abrirLightbox(indexReal, fotosEscritorio);
        galeria.appendChild(img);
    });

    if (modoVista === "paginas") {
        renderizarPaginacion();
        document.getElementById("btnVerMas").style.display = "none";
    } else {
        document.getElementById("paginacion").innerHTML = "";
        document.getElementById("btnVerMas").style.display =
            fotosVisibles < fotosEscritorio.length ? "block" : "none";
    }
}

function renderizarPaginacion() {
    const total = Math.ceil(fotosEscritorio.length / fotosPorPagina);
    const pag = document.getElementById("paginacion");
    pag.innerHTML = "";
    if (total <= 1) return;
    const prev = document.createElement("button");
    prev.textContent = "◀";
    prev.onclick = () => { if (paginaActual > 1) { paginaActual--; renderizar(); } };
    pag.appendChild(prev);
    for (let i = 1; i <= total; i++) {
        const btn = document.createElement("button");
        btn.textContent = i;
        if (i === paginaActual) btn.classList.add("activo");
        btn.onclick = ((p) => () => { paginaActual = p; renderizar(); })(i);
        pag.appendChild(btn);
    }
    const next = document.createElement("button");
    next.textContent = "▶";
    next.onclick = () => { if (paginaActual < total) { paginaActual++; renderizar(); } };
    pag.appendChild(next);
}

function verMas() {
    fotosVisibles += fotosPorPagina;
    renderizar();
}

// ── LIGHTBOX ──
function abrirLightbox(index, lista) {
    fotoActual = index;
    fotosLightbox = lista;
    document.getElementById("lightboxImg").src = fotosLightbox[fotoActual];
    document.getElementById("lightbox").classList.add("activo");
}
function cerrarLightbox() {
    document.getElementById("lightbox").classList.remove("activo");
}
function cambiarFoto(dir) {
    fotoActual += dir;
    if (fotoActual < 0) fotoActual = fotosLightbox.length - 1;
    if (fotoActual >= fotosLightbox.length) fotoActual = 0;
    document.getElementById("lightboxImg").src = fotosLightbox[fotoActual];
}

// ── CONTROLES ──
function cambiarFotosPorPagina() {
    fotosPorPagina = parseInt(document.getElementById("fotosPorPagina").value);
    fotosVisibles = fotosPorPagina;
    paginaActual = 1;
    renderizar();
}
function cambiarModoVista() {
    modoVista = document.getElementById("modoVista").value;
    paginaActual = 1;
    fotosVisibles = fotosPorPagina;
    renderizar();
}
function ordenarFotos() {
    const orden = document.getElementById("ordenFotos").value;
    if (orden === "original") fotosEscritorio = [...datos.escritorio];
    else if (orden === "az") fotosEscritorio = [...datos.escritorio].sort();
    else if (orden === "za") fotosEscritorio = [...datos.escritorio].sort().reverse();
    else if (orden === "nuevas") fotosEscritorio = [...datos.escritorio].reverse();
    else if (orden === "antiguas") fotosEscritorio = [...datos.escritorio];
    paginaActual = 1;
    renderizar();
}
function cambiarForma() {
    document.getElementById("galeria").className = "galeria " + document.getElementById("formaFotos").value;
}
function cambiarColor() {
    document.getElementById("titulo").style.color = document.getElementById("colorTitulo").value;
}
function cambiarTamano() {
    document.getElementById("titulo").style.fontSize = document.getElementById("tamanoTitulo").value + "px";
}
function cambiarFuente() {
    document.getElementById("titulo").style.fontFamily = document.getElementById("fuenteTitulo").value;
}
function cambiarDiseno() {
    const t = document.getElementById("titulo");
    const d = document.getElementById("disenoTitulo").value;
    t.style.textShadow = "";
    t.style.textDecoration = "";
    t.style.textTransform = "";
    t.style.letterSpacing = "";
    if (d === "sombra") t.style.textShadow = "3px 3px 8px rgba(0,0,0,0.35)";
    else if (d === "subrayado") t.style.textDecoration = "underline";
    else if (d === "mayusculas") t.style.textTransform = "uppercase";
    else if (d === "espaciado") t.style.letterSpacing = "10px";
}
function mostrarOpcionesFondo() {
    const tipo = document.getElementById("tipoFondo").value;
    document.getElementById("grupoDegradado").style.display = tipo === "degradado" ? "flex" : "none";
    document.getElementById("grupoSolido").style.display = tipo === "solido" ? "flex" : "none";
    document.getElementById("grupoImagen").style.display = tipo === "imagen" ? "flex" : "none";
    if (tipo === "degradado") aplicarDegradado();
    if (tipo === "solido") aplicarSolido();
}
function aplicarDegradado() {
    const c1 = document.getElementById("color1").value;
    const c2 = document.getElementById("color2").value;
    document.body.style.background = `linear-gradient(135deg, ${c1}, ${c2})`;
}
function aplicarSolido() {
    document.body.style.background = document.getElementById("colorSolido").value;
}
function aplicarImagenFondo() {
    const f = document.getElementById("imagenFondo").files[0];
    if (!f) return;
    document.body.style.background = `url('${URL.createObjectURL(f)}') center/cover no-repeat fixed`;
}
function cambiarColorPanel() {
    const hex = document.getElementById("colorPanel").value;
    const op = document.getElementById("opacidadPanel").value / 100;
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    document.getElementById("panel").style.background = `rgba(${r},${g},${b},${op})`;
}

document.addEventListener("keydown", e => {
    if (e.key === "Escape") { cerrarLightbox(); cerrarModal(); }
    if (e.key === "ArrowRight") cambiarFoto(1);
    if (e.key === "ArrowLeft") cambiarFoto(-1);
});
</script>
</body>
</html>
