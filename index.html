<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Fotos Familiares</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffecd2, #fcb69f);
            transition: background 0.5s;
        }
        h1 {
            text-align: center;
            color: #8B4513;
            font-size: 36px;
            margin-bottom: 15px;
        }
        .panel {
            background: rgba(255,255,255,0.6);
            border-radius: 15px;
            padding: 15px 20px;
            max-width: 850px;
            margin: 0 auto 25px auto;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            align-items: center;
        }
        .panel .grupo {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .panel label {
            font-weight: bold;
            font-size: 13px;
        }
        .panel select, .panel input[type="color"] {
            padding: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            cursor: pointer;
        }
        .panel input[type="color"] {
            width: 50px;
            height: 35px;
            padding: 2px;
        }
        .panel button {
            padding: 7px 14px;
            border: none;
            border-radius: 8px;
            background: #8B4513;
            color: white;
            cursor: pointer;
            font-size: 13px;
        }
        .panel button:hover { background: #a0522d; }

        /* Galería */
        .galeria {
            display: grid;
            gap: 15px;
            max-width: 900px;
            margin: 0 auto;
            grid-template-columns: repeat(3, 1fr);
        }
        .galeria.grande {
            grid-template-columns: repeat(2, 1fr);
        }
        .galeria img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .galeria.cuadricula img { border-radius: 10px; }
        .galeria.circulos img {
            border-radius: 50%;
            height: 200px;
            width: 200px;
            justify-self: center;
        }
        .galeria.grande img {
            border-radius: 15px;
            height: 280px;
        }
        .galeria img:hover { transform: scale(1.05); }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.88);
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        .lightbox.activo { display: flex; }
        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(255,255,255,0.3);
        }
        .cerrar {
            position: absolute;
            top: 20px; right: 30px;
            font-size: 40px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        .anterior, .siguiente {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 50px;
            color: white;
            cursor: pointer;
            background: rgba(0,0,0,0.4);
            padding: 10px 18px;
            border-radius: 50%;
            user-select: none;
        }
        .anterior { left: 20px; }
        .siguiente { right: 20px; }
    </style>
</head>
<body>

<h1 id="titulo">📷 Mis Fotos Familiares</h1>

<div class="panel">

    <!-- Título -->
    <div class="grupo">
        <label>Color del título</label>
        <input type="color" id="colorTitulo" value="#8B4513" onchange="cambiarColor()">
    </div>
    <div class="grupo">
        <label>Fuente del título</label>
        <select id="fuenteTitulo" onchange="cambiarFuente()">
            <option value="Arial">Arial</option>
            <option value="Georgia">Georgia</option>
            <option value="Courier New">Courier New</option>
            <option value="Times New Roman">Times New Roman</option>
            <option value="Verdana">Verdana</option>
            <option value="Impact">Impact</option>
        </select>
    </div>

    <!-- Forma de fotos -->
    <div class="grupo">
        <label>Forma de las fotos</label>
        <select id="formaFotos" onchange="cambiarForma()">
            <option value="cuadricula">Cuadrícula</option>
            <option value="circulos">Círculos</option>
            <option value="grande">Cuadros grandes</option>
        </select>
    </div>

    <!-- Fondo -->
    <div class="grupo">
        <label>Tipo de fondo</label>
        <select id="tipoFondo" onchange="mostrarOpcionesFondo()">
            <option value="degradado">Degradado</option>
            <option value="solido">Color sólido</option>
            <option value="imagen">Mi imagen</option>
        </select>
    </div>

    <!-- Fondo degradado -->
    <div class="grupo" id="grupoDegradado">
        <label>Color 1</label>
        <input type="color" id="color1" value="#ffecd2" onchange="aplicarDegradado()">
        <label>Color 2</label>
        <input type="color" id="color2" value="#fcb69f" onchange="aplicarDegradado()">
    </div>

    <!-- Fondo sólido -->
    <div class="grupo" id="grupoSolido" style="display:none">
        <label>Color de fondo</label>
        <input type="color" id="colorSolido" value="#ffecd2" onchange="aplicarSolido()">
    </div>

    <!-- Fondo imagen -->
    <div class="grupo" id="grupoImagen" style="display:none">
        <label>Subir imagen de fondo</label>
        <input type="file" id="imagenFondo" accept="image/*" onchange="aplicarImagenFondo()">
    </div>

</div>

<div class="galeria cuadricula" id="galeria"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
    <span class="cerrar" onclick="cerrarLightbox()">✕</span>
    <span class="anterior" onclick="cambiarFoto(-1)">&#10094;</span>
    <img id="lightboxImg" src="" alt="Foto ampliada">
    <span class="siguiente" onclick="cambiarFoto(1)">&#10095;</span>
</div>

<script>
    // =============================================
    // AGREGA TUS FOTOS AQUÍ — solo añade más líneas
    // =============================================
    const fotos = [
        "foto1.jpg",
        "foto2.jpg",
        "foto3.jpg",
        "foto4.jpg",
        "foto5.jpg",
        "foto6.jpg",
        "foto7.jpg",
        "foto8.jpg",
        "foto9.jpg",
        "foto10.jpg",
    ];
    // =============================================

    let fotoActual = 0;

    function cargarGaleria() {
        const galeria = document.getElementById("galeria");
        fotos.forEach((foto, index) => {
            const img = document.createElement("img");
            img.src = foto;
            img.alt = "Foto familiar " + (index + 1);
            img.onclick = () => abrirLightbox(index);
            galeria.appendChild(img);
        });
    }

    function abrirLightbox(index) {
        fotoActual = index;
        document.getElementById("lightboxImg").src = fotos[fotoActual];
        document.getElementById("lightbox").classList.add("activo");
    }

    function cerrarLightbox() {
        document.getElementById("lightbox").classList.remove("activo");
    }

    function cambiarFoto(dir) {
        fotoActual += dir;
        if (fotoActual < 0) fotoActual = fotos.length - 1;
        if (fotoActual >= fotos.length) fotoActual = 0;
        document.getElementById("lightboxImg").src = fotos[fotoActual];
    }

    function cambiarColor() {
        document.getElementById("titulo").style.color = document.getElementById("colorTitulo").value;
    }

    function cambiarFuente() {
        document.getElementById("titulo").style.fontFamily = document.getElementById("fuenteTitulo").value;
    }

    function cambiarForma() {
        const galeria = document.getElementById("galeria");
        galeria.className = "galeria " + document.getElementById("formaFotos").value;
    }

    function mostrarOpcionesFondo() {
        const tipo = document.getElementById("tipoFondo").value;
        document.getElementById("grupoDegradado").style.display = tipo === "degradado" ? "flex" : "none";
        document.getElementById("grupoSolido").style.display = tipo === "solido" ? "flex" : "none";
        document.getElementById("grupoImagen").style.display = tipo === "imagen" ? "flex" : "none";
        if (tipo === "degradado") aplicarDegradado();
        if (tipo === "solido") aplicarSolido();
    }

    function aplicarDegradado() {
        const c1 = document.getElementById("color1").value;
        const c2 = document.getElementById("color2").value;
        document.body.style.background = `linear-gradient(135deg, ${c1}, ${c2})`;
        document.body.style.backgroundSize = "";
    }

    function aplicarSolido() {
        document.body.style.background = document.getElementById("colorSolido").value;
    }

    function aplicarImagenFondo() {
        const archivo = document.getElementById("imagenFondo").files[0];
        if (!archivo) return;
        const url = URL.createObjectURL(archivo);
        document.body.style.background = `url('${url}') center/cover no-repeat fixed`;
    }

    document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") cerrarLightbox();
        if (e.key === "ArrowRight") cambiarFoto(1);
        if (e.key === "ArrowLeft") cambiarFoto(-1);
    });

    cargarGaleria();
</script>

</body>
</html>
